name: 'Setup changelogger'
description: 'Install the changelogger CLI from a released binary asset.'

author: 'Adrian Ross'

branding:
  color: 'blue'
  icon: 'file-text'

inputs:
  version:
    description: 'changelogger release tag to install.'
    required: false
    default: 'v0.7.0'
  repository:
    description: 'Repository that publishes changelogger release assets.'
    required: false
    default: 'adrianmross/changelogger'
  token:
    description: 'Optional GitHub token for private release repositories.'
    required: false

outputs:
  path:
    description: 'Path to the installed changelogger binary.'
    value: ${{ steps.install.outputs.path }}

runs:
  using: 'composite'
  steps:
    - name: Resolve changelogger asset
      id: platform
      shell: bash
      env:
        CHANGELOGGER_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        version="${CHANGELOGGER_VERSION}"
        if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
          echo "Invalid changelogger version: $version" >&2
          exit 1
        fi

        case "$RUNNER_OS" in
          Linux) os="linux" ;;
          macOS) os="darwin" ;;
          Windows) os="windows" ;;
          *)
            echo "Unsupported runner OS: $RUNNER_OS" >&2
            exit 1
            ;;
        esac

        case "$RUNNER_ARCH" in
          X64) arch="amd64" ;;
          ARM64) arch="arm64" ;;
          *)
            echo "Unsupported runner architecture: $RUNNER_ARCH" >&2
            exit 1
            ;;
        esac

        if [[ "$os" == "windows" && "$arch" == "arm64" ]]; then
          echo "Windows arm64 changelogger release assets are not published." >&2
          exit 1
        fi

        version_without_v="${version#v}"
        archive="changelogger_${version_without_v}_${os}_${arch}.tar.gz"
        install_dir="${RUNNER_TEMP}/changelogger-${version}"

        echo "archive=$archive" >> "$GITHUB_OUTPUT"
        echo "install-dir=$install_dir" >> "$GITHUB_OUTPUT"
        echo "os=$os" >> "$GITHUB_OUTPUT"

    - name: Install changelogger
      id: install
      shell: bash
      env:
        CHANGELOGGER_ARCHIVE: ${{ steps.platform.outputs.archive }}
        CHANGELOGGER_INSTALL_DIR: ${{ steps.platform.outputs.install-dir }}
        CHANGELOGGER_OS: ${{ steps.platform.outputs.os }}
        CHANGELOGGER_REPOSITORY: ${{ inputs.repository }}
        CHANGELOGGER_TOKEN: ${{ inputs.token }}
        CHANGELOGGER_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        archive="${CHANGELOGGER_ARCHIVE}"
        install_dir="${CHANGELOGGER_INSTALL_DIR}"
        mkdir -p "$install_dir"

        download_url="${GITHUB_SERVER_URL:-https://github.com}/${CHANGELOGGER_REPOSITORY}/releases/download/${CHANGELOGGER_VERSION}/${archive}"
        curl_args=(-fsSL -o "${RUNNER_TEMP}/${archive}")
        if [[ -n "${CHANGELOGGER_TOKEN}" ]]; then
          curl_args+=(-H "Authorization: Bearer ${CHANGELOGGER_TOKEN}")
        fi

        curl "${curl_args[@]}" "$download_url"

        tar -xzf "${RUNNER_TEMP}/${archive}" -C "$install_dir"

        binary="${install_dir}/changelogger"
        if [[ "$CHANGELOGGER_OS" == "windows" ]]; then
          binary="${install_dir}/changelogger.exe"
        fi
        chmod +x "$binary" 2>/dev/null || true

        "$binary" version
        echo "$install_dir" >> "$GITHUB_PATH"
        echo "path=$binary" >> "$GITHUB_OUTPUT"
