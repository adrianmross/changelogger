name: 'Setup changelogger'
description: 'Install the changelogger CLI from a released binary asset.'

author: 'Adrian Ross'

branding:
  color: 'blue'
  icon: 'file-text'

inputs:
  version:
    description: 'changelogger release tag to install.'
    required: false
    default: 'v0.8.0'
  repository:
    description: 'Repository that publishes changelogger release assets.'
    required: false
    default: 'adrianmross/changelogger'
  token:
    description: 'Optional GitHub token for private release repositories.'
    required: false
  command:
    description: 'Optional changelogger command to run after installation.'
    required: false
  args:
    description: 'Optional arguments for the changelogger command.'
    required: false
  working-directory:
    description: 'Directory where the optional changelogger command should run.'
    required: false
    default: '.'

outputs:
  path:
    description: 'Path to the installed changelogger binary.'
    value: ${{ steps.install.outputs.path }}
  stdout:
    description: 'Captured stdout/stderr from the optional changelogger command.'
    value: ${{ steps.run-command.outputs.stdout }}
  should_tag:
    description: 'release-tag should_tag output when command output includes it.'
    value: ${{ steps.run-command.outputs.should_tag }}
  tag:
    description: 'release-tag tag output when command output includes it.'
    value: ${{ steps.run-command.outputs.tag }}
  reason:
    description: 'release-tag reason output when command output includes it.'
    value: ${{ steps.run-command.outputs.reason }}
  number:
    description: 'release-pr-info number output when command output includes it.'
    value: ${{ steps.run-command.outputs.number }}
  head_ref:
    description: 'release-pr-info head_ref output when command output includes it.'
    value: ${{ steps.run-command.outputs.head_ref }}

runs:
  using: 'composite'
  steps:
    - name: Resolve changelogger asset
      id: platform
      shell: bash
      env:
        CHANGELOGGER_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        version="${CHANGELOGGER_VERSION}"
        if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
          echo "Invalid changelogger version: $version" >&2
          exit 1
        fi

        case "$RUNNER_OS" in
          Linux) os="linux" ;;
          macOS) os="darwin" ;;
          Windows) os="windows" ;;
          *)
            echo "Unsupported runner OS: $RUNNER_OS" >&2
            exit 1
            ;;
        esac

        case "$RUNNER_ARCH" in
          X64) arch="amd64" ;;
          ARM64) arch="arm64" ;;
          *)
            echo "Unsupported runner architecture: $RUNNER_ARCH" >&2
            exit 1
            ;;
        esac

        if [[ "$os" == "windows" && "$arch" == "arm64" ]]; then
          echo "Windows arm64 changelogger release assets are not published." >&2
          exit 1
        fi

        version_without_v="${version#v}"
        archive="changelogger_${version_without_v}_${os}_${arch}.tar.gz"
        install_dir="${RUNNER_TEMP}/changelogger-${version}"

        echo "archive=$archive" >> "$GITHUB_OUTPUT"
        echo "install-dir=$install_dir" >> "$GITHUB_OUTPUT"
        echo "os=$os" >> "$GITHUB_OUTPUT"

    - name: Install changelogger
      id: install
      shell: bash
      env:
        CHANGELOGGER_ARCHIVE: ${{ steps.platform.outputs.archive }}
        CHANGELOGGER_INSTALL_DIR: ${{ steps.platform.outputs.install-dir }}
        CHANGELOGGER_OS: ${{ steps.platform.outputs.os }}
        CHANGELOGGER_REPOSITORY: ${{ inputs.repository }}
        CHANGELOGGER_TOKEN: ${{ inputs.token }}
        CHANGELOGGER_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        archive="${CHANGELOGGER_ARCHIVE}"
        install_dir="${CHANGELOGGER_INSTALL_DIR}"
        mkdir -p "$install_dir"

        download_url="${GITHUB_SERVER_URL:-https://github.com}/${CHANGELOGGER_REPOSITORY}/releases/download/${CHANGELOGGER_VERSION}/${archive}"
        curl_args=(-fsSL -o "${RUNNER_TEMP}/${archive}")
        if [[ -n "${CHANGELOGGER_TOKEN}" ]]; then
          curl_args+=(-H "Authorization: Bearer ${CHANGELOGGER_TOKEN}")
        fi

        curl "${curl_args[@]}" "$download_url"

        tar -xzf "${RUNNER_TEMP}/${archive}" -C "$install_dir"

        binary="${install_dir}/changelogger"
        if [[ "$CHANGELOGGER_OS" == "windows" ]]; then
          binary="${install_dir}/changelogger.exe"
        fi
        chmod +x "$binary" 2>/dev/null || true

        "$binary" version
        echo "$install_dir" >> "$GITHUB_PATH"
        echo "path=$binary" >> "$GITHUB_OUTPUT"

    - name: Run changelogger command
      id: run-command
      if: inputs.command != ''
      shell: bash
      env:
        CHANGELOGGER_ARGS: ${{ inputs.args }}
        CHANGELOGGER_BINARY: ${{ steps.install.outputs.path }}
        CHANGELOGGER_COMMAND: ${{ inputs.command }}
        CHANGELOGGER_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        output_file="${RUNNER_TEMP}/changelogger-command-output"
        status=0

        set +e
        (
          cd "$CHANGELOGGER_WORKING_DIRECTORY"
          # CHANGELOGGER_ARGS is intentionally split by the shell so workflows can pass CLI flags.
          "$CHANGELOGGER_BINARY" "$CHANGELOGGER_COMMAND" ${CHANGELOGGER_ARGS}
        ) 2>&1 | tee "$output_file"
        status=${PIPESTATUS[0]}
        set -e

        {
          echo "stdout<<CHANGELOGGER_STDOUT"
          cat "$output_file"
          echo "CHANGELOGGER_STDOUT"
        } >> "$GITHUB_OUTPUT"

        grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$output_file" >> "$GITHUB_OUTPUT" || true

        exit "$status"
